<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ElowFlor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Estilos Globais (Animação do background) -->
    <link rel="stylesheet" href="/styles/styles.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            teal: '#236D75',
                            green: '#4D8329',
                            blue: '#1B6790',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-brand-teal font-sans">

    <!-- Container Principal -->
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden relative">
        
        <div class="p-8 sm:p-10">
            <!-- Cabeçalho / Logo -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">Bem-vindo!</h1>
                <p class="text-gray-500 text-sm">Por favor, insira seus dados para continuar.</p>
            </div>

            <!-- Formulário -->
            <form id="loginForm" class="space-y-6">
                <!-- Campo de Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ph ph-envelope-simple text-gray-400 text-lg"></i>
                        </div>
                        <input type="email" id="email" name="email" required
                            class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-blue focus:border-brand-blue transition-shadow bg-gray-50 focus:bg-white"
                            placeholder="seu@email.com">
                    </div>
                </div>

                <!-- Campo de Senha -->
                <div>
                    <div class="flex items-center justify-between mb-1">
                        <label for="password" class="block text-sm font-medium text-gray-700">Senha</label>
                        <a href="#" class="text-xs font-medium text-brand-blue hover:text-brand-teal transition-colors">Esqueceu a senha?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ph ph-lock-key text-gray-400 text-lg"></i>
                        </div>
                        <input type="password" id="password" name="password" required
                            class="block w-full pl-10 pr-10 py-3 border border-gray-200 rounded-xl text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-blue focus:border-brand-blue transition-shadow bg-gray-50 focus:bg-white"
                            placeholder="••••••••">
                        <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none">
                            <i class="ph ph-eye text-lg" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Lembrar-me -->
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox"
                        class="h-4 w-4 text-brand-teal focus:ring-brand-teal border-gray-300 rounded cursor-pointer accent-brand-teal">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-600 cursor-pointer">
                        Lembrar de mim
                    </label>
                </div>

                <!-- Mensagem de erro/sucesso (Oculta por padrão) -->
                <div id="messageBox" class="hidden rounded-md p-4 text-sm">
                </div>

                <!-- Botão de Enviar -->
                <button type="submit" id="submitBtn"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-brand-teal hover:bg-brand-blue focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-teal transition-colors duration-300 relative">
                    <span id="btnText">Entrar na conta</span>
                    <i class="ph ph-spinner-gap animate-spin hidden text-xl absolute" id="btnSpinner"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Lógica JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            const loginForm = document.getElementById('loginForm');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const messageBox = document.getElementById('messageBox');

            // Alternar visibilidade da senha
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                if (type === 'text') {
                    eyeIcon.classList.remove('ph-eye');
                    eyeIcon.classList.add('ph-eye-slash');
                } else {
                    eyeIcon.classList.remove('ph-eye-slash');
                    eyeIcon.classList.add('ph-eye');
                }
            });

            // Simular envio do formulário
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                // Resetar mensagens
                messageBox.classList.add('hidden');
                messageBox.classList.remove('bg-red-50', 'text-red-800', 'bg-green-50', 'text-green-800');
                
                // Estado de carregamento
                submitBtn.disabled = true;
                btnText.classList.add('opacity-0');
                btnSpinner.classList.remove('hidden');

                // Simular uma requisição à API (delay de 1.5s)
                setTimeout(() => {
                    const email = document.getElementById('email').value;
                    
                    // Estado normal do botão
                    submitBtn.disabled = false;
                    btnText.classList.remove('opacity-0');
                    btnSpinner.classList.add('hidden');

                    // Simulação de validação simples
                    if(email) {
                        messageBox.innerHTML = '<div class="flex items-center"><i class="ph ph-check-circle mr-2 text-lg"></i> Login efetuado com sucesso!</div>';
                        messageBox.classList.add('bg-green-50', 'text-green-800');
                        messageBox.classList.remove('hidden');
                        
                        // Limpar formulário (opcional)
                        // loginForm.reset();
                    } else {
                        messageBox.innerHTML = '<div class="flex items-center"><i class="ph ph-warning-circle mr-2 text-lg"></i> Ocorreu um erro ao fazer login.</div>';
                        messageBox.classList.add('bg-red-50', 'text-red-800');
                        messageBox.classList.remove('hidden');
                    }
                }, 1500);
            });
        });
    </script>
</body>
</html>
